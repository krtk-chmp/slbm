name: Daily SLBM data pull
on:
  schedule:
    - cron: "30 15 * * 1-5"   # 9:00 PM IST, Mon-Fri (after NSE publishes EOD files)
  workflow_dispatch:            # lets you run it manually from the Actions tab
permissions:
  contents: write
jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install curl_cffi pandas
      - run: python run_daily.py
      - name: Commit updated database
        run: |
          git config user.name "slbm-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/slbm.db
          git diff --cached --quiet || git commit -m "data: $(date +%F)"
          git push
